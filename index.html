<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Wicked Admin & Support System</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --wicked-green: #97d72e; --dark: #111; --border: #333; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        nav { padding: 15px 50px; background: #000; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .container { max-width: 1200px; margin: 20px auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 20px; }
        .card { background: var(--dark); padding: 20px; border-radius: 10px; border: 1px solid var(--border); }
        
        /* Kalender & Shows */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid var(--border); }
        .day { min-height: 90px; border: 1px solid var(--border); padding: 10px; cursor: pointer; transition: 0.3s; }
        .day:hover { background: #1a1a1a; }
        .has-show { border-bottom: 3px solid var(--wicked-green); }

        /* Modals */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border: 2px solid var(--wicked-green); display: none; z-index: 1000; width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 900; }
        
        /* Seating */
        .seating { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin: 20px 0; }
        .seat { aspect-ratio: 1; background: var(--wicked-green); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #000; }
        .seat.taken { background: #444; color: #888; cursor: not-allowed; }

        /* UI Elements */
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid var(--border); color: #fff; border-radius: 5px; }
        .btn { background: var(--wicked-green); color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .admin-only { color: gold; font-weight: bold; cursor: pointer; }
        .support-user { background: #222; padding: 10px; border-radius: 5px; margin-bottom: 10px; border-left: 4px solid var(--wicked-green); }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 24px; font-weight: bold;">WICKED <span style="color: var(--wicked-green);">PRODUCTIONS</span></div>
    <div>
        <span id="admin-link" class="admin-only" style="display:none; margin-right:20px;" onclick="openAdmin()">ADMIN & SUPPORT</span>
        <span id="login-btn" onclick="openAuth()" style="cursor:pointer">INLOGGEN</span>
    </div>
</nav>

<div class="container">
    <aside>
        <div class="card">
            <h3 id="display-name">Welkom Bezoeker</h3>
            <div id="my-tickets">Je hebt nog geen tickets.</div>
        </div>
    </aside>
    <main class="card">
        <h2>Speelschema Maart 2026</h2>
        <p style="font-size: 12px; color: #888;">Klik op een dag voor show-informatie en tickets.</p>
        <div class="calendar" id="calendar"></div>
    </main>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="modal" id="show-modal">
    <h2 id="modal-date">Show Info</h2>
    <div id="show-content">
        <p><strong>Cast:</strong> <span id="modal-cast">Geen show gepland.</span></p>
        <div id="booking-section" style="display:none;">
            <h4>Kies een stoel:</h4>
            <div class="seating" id="seating-grid"></div>
        </div>
    </div>
</div>

<div class="modal" id="admin-modal">
    <h2>Admin Dashboard</h2>
    <div style="border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px;">
        <button class="btn" onclick="toggleAdminTab('shows')">Show Beheer</button>
        <button class="btn" style="background:#444; color:white; margin-top:5px;" onclick="toggleAdminTab('support')">Support (Users)</button>
    </div>

    <div id="tab-shows">
        <h3>Show Plannen</h3>
        <input type="number" id="adm-day" placeholder="Dag van de maand">
        <input type="text" id="adm-time" placeholder="Tijd (bijv. 19:30)">
        <textarea id="adm-cast" placeholder="Cast lijst (bijv. Elphaba: Naam, Glinda: Naam)"></textarea>
        <button class="btn" onclick="saveShow()">SHOW OPSLAAN</button>
    </div>

    <div id="tab-support" style="display:none;">
        <h3>Gebruikers Beheren</h3>
        <div id="user-list">Laden...</div>
    </div>
</div>

<div class="modal" id="auth-modal">
    <h3>Account</h3>
    <input type="email" id="auth-email" placeholder="Email">
    <input type="password" id="auth-pass" placeholder="Wachtwoord">
    <button class="btn" onclick="handleAuth()">LOG IN / REGISTREER</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC6NE5hOdVdRc1JJuxe5jbyT7LLaXJi84o",
        authDomain: "wickeddemusical.firebaseapp.com",
        projectId: "wickeddemusical",
        storageBucket: "wickeddemusical.firebasestorage.app",
        messagingSenderId: "81908034436",
        appId: "1:81908034436:web:1d56709ad83e7492e4cbd1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ADMIN_EMAIL = "mick.saarloos12@gmail.com"; // VERANDER DIT

    let currentShowId = null;

    // Core Init
    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('display-name').innerText = user.email;
            document.getElementById('login-btn').innerText = "UITLOGGEN";
            document.getElementById('login-btn').onclick = () => auth.signOut().then(()=>location.reload());
            if(user.email === ADMIN_EMAIL) document.getElementById('admin-link').style.display = 'inline';
            loadMyTickets(user.uid);
        }
        renderCalendar();
    });

    // Calendar & Show Info
    async function renderCalendar() {
        const snap = await db.collection('shows').get();
        const shows = {};
        snap.forEach(doc => shows[doc.data().day] = {id: doc.id, ...doc.data()});
        
        const cal = document.getElementById('calendar');
        cal.innerHTML = '';
        for(let i=1; i<=31; i++) {
            const hasShow = shows[i] ? 'has-show' : '';
            cal.innerHTML += `<div class="day ${hasShow}" onclick="openShow(${i}, '${shows[i]?.id || ''}')">${i}</div>`;
        }
    }

    async function openShow(day, id) {
        currentShowId = id;
        document.getElementById('overlay').style.display = 'block';
        const modal = document.getElementById('show-modal');
        modal.style.display = 'block';
        document.getElementById('modal-date').innerText = day + " Maart 2026";
        
        if(!id) {
            document.getElementById('modal-cast').innerText = "Geen show gepland op deze dag.";
            document.getElementById('booking-section').style.display = 'none';
            return;
        }

        const doc = await db.collection('shows').doc(id).get();
        const data = doc.data();
        document.getElementById('modal-cast').innerText = data.cast || "Nog niet bekend";
        document.getElementById('booking-section').style.display = 'block';
        renderSeats(data.takenSeats || []);
    }

    function renderSeats(taken) {
        const grid = document.getElementById('seating-grid');
        grid.innerHTML = '';
        for(let i=1; i<=50; i++) {
            const isTaken = taken.includes(i);
            grid.innerHTML += `<div class="seat ${isTaken ? 'taken' : ''}" onclick="bookSeat(${i}, ${isTaken})">${i}</div>`;
        }
    }

    async function bookSeat(num, isTaken) {
        if(isTaken) return;
        const user = auth.currentUser;
        if(!user) return alert("Log eerst in!");
        
        await db.collection('shows').doc(currentShowId).update({
            takenSeats: firebase.firestore.FieldValue.arrayUnion(num)
        });
        
        await db.collection('users').doc(user.uid).collection('tickets').add({
            seat: num,
            showId: currentShowId,
            date: document.getElementById('modal-date').innerText
        });
        
        alert("Gereserveerd!");
        location.reload();
    }

    // Admin & Support Logic
    function openAdmin() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('admin-modal').style.display = 'block';
        loadUsers();
    }

    async function saveShow() {
        const day = parseInt(document.getElementById('adm-day').value);
        const time = document.getElementById('adm-time').value;
        const cast = document.getElementById('adm-cast').value;
        await db.collection('shows').add({ day, time, cast, takenSeats: [] });
        alert("Show toegevoegd!");
        location.reload();
    }

    async function loadUsers() {
        const snap = await db.collection('users').get();
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const u = doc.data();
            list.innerHTML += `
                <div class="support-user">
                    <b>${u.email}</b><br>
                    <button class="btn" style="padding:5px; margin-top:5px;" onclick="manualTicket('${doc.id}')">+ Ticket Toevoegen</button>
                </div>`;
        });
    }

    async function manualTicket(uid) {
        const seat = prompt("Welk stoelnummer?");
        const show = prompt("Welke dag (getal 1-31)?");
        // Dit is een versimpelde support actie
        await db.collection('users').doc(uid).collection('tickets').add({
            seat: parseInt(seat),
            date: show + " Maart (Support toegevoegd)"
        });
        alert("Ticket handmatig toegevoegd aan account!");
    }

    // Helpers
    function closeAll() {
        document.querySelectorAll('.modal, .overlay').forEach(el => el.style.display = 'none');
    }

    function toggleAdminTab(tab) {
        document.getElementById('tab-shows').style.display = tab === 'shows' ? 'block' : 'none';
        document.getElementById('tab-support').style.display = tab === 'support' ? 'block' : 'none';
    }

    function openAuth() { document.getElementById('overlay').style.display='block'; document.getElementById('auth-modal').style.display='block'; }

    async function handleAuth() {
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-pass').value;
        try { await auth.signInWithEmailAndPassword(e, p); }
        catch { 
            const res = await auth.createUserWithEmailAndPassword(e, p); 
            await db.collection('users').doc(res.user.uid).set({email: e});
        }
        location.reload();
    }

    async function loadMyTickets(uid) {
        const snap = await db.collection('users').doc(uid).collection('tickets').get();
        const div = document.getElementById('my-tickets');
        if(!snap.empty) {
            div.innerHTML = '';
            snap.forEach(doc => {
                div.innerHTML += `<div style="color:var(--wicked-green); font-size:13px; margin-bottom:5px;">🎟️ Stoel ${doc.data().seat} (${doc.data().date})</div>`;
            });
        }
    }
</script>

</body>
</html>
