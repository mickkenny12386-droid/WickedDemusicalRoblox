<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moulin Rouge! | Coming Soon</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Playfair+Display:ital,wght@1,700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --rouge: #4a0404; --bright-red: #bc0000; --gold: #d4af37; --gold-light: #f9e29b; --black: #050505; 
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--black);
            background-image: radial-gradient(circle at center, var(--rouge) 0%, var(--black) 100%);
            color: white; font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; text-align: center;
        }

        .curtain-container {
            position: relative; width: 90%; max-width: 800px; padding: 40px;
            border: 3px solid var(--gold); background: rgba(0,0,0,0.8);
            box-shadow: 0 0 50px rgba(188,0,0,0.5), inset 0 0 30px rgba(0,0,0,1);
            border-radius: 5px; animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 30px rgba(188,0,0,0.3); }
            to { box-shadow: 0 0 60px rgba(188,0,0,0.7), 0 0 20px var(--gold); }
        }

        .logo {
            font-family: 'Cinzel Decorative'; color: var(--gold);
            font-size: 3rem; margin-bottom: 20px; letter-spacing: 5px;
            text-shadow: 2px 2px 0px #000, 0 0 15px var(--bright-red);
        }

        .message-container { margin-bottom: 40px; border-bottom: 1px solid var(--gold); padding-bottom: 20px; }

        .lang-block { margin-bottom: 15px; opacity: 0; animation: fadeInUp 1s forwards; }
        .lang-block:nth-child(1) { animation-delay: 0.2s; }
        .lang-block:nth-child(2) { animation-delay: 0.5s; }
        .lang-block:nth-child(3) { animation-delay: 0.8s; }

        .closed-text { font-size: 1.4rem; font-weight: bold; text-transform: uppercase; color: #fff; margin: 5px 0; }

        .spectacular-news {
            font-family: 'Playfair Display'; font-style: italic; color: var(--gold-light);
            font-size: 1.8rem; margin-top: 30px; line-height: 1.4;
            animation: pulse 2s infinite;
        }

        .paris-tag {
            display: inline-block; margin-top: 20px; padding: 10px 25px;
            border: 1px solid var(--gold); font-family: 'Cinzel Decorative';
            letter-spacing: 3px; color: var(--gold); font-size: 0.9rem;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px var(--bright-red); }
            50% { transform: scale(1.02); text-shadow: 0 0 25px var(--bright-red); }
        }

        /* Windmill Decor */
        .windmill {
            position: absolute; bottom: -50px; right: -50px; width: 200px; opacity: 0.1;
            pointer-events: none; transform: rotate(-15deg);
        }
    </style>
</head>
<body>

    <div class="curtain-container">
        <div class="logo">MOULIN ROUGE!</div>
        
        <div class="message-container">
            <div class="lang-block">
                <p class="closed-text">De website is tijdelijk gesloten</p>
            </div>
            <div class="lang-block">
                <p class="closed-text">The website is temporarily closed</p>
            </div>
            <div class="lang-block">
                <p class="closed-text">Die Website ist vorübergehend geschlossen</p>
            </div>
        </div>

        <div class="spectacular-news">
            Er komt iets spectaculairs aan... rechtstreeks vanuit de Moulin Rouge in Parijs!
            <br>
            <small style="font-size: 0.6em; letter-spacing: 2px;">PREPARE FOR THE EXTRAVAGANZA</small>
        </div>

        <div class="paris-tag">DIRECTLY FROM PARIS</div>
    </div>

    <script>
        // Een subtiele gouden confetti regen bij het laden
        window.onload = () => {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 2,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#d4af37', '#bc0000']
                });
                confetti({
                    particleCount: 2,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#d4af37', '#bc0000']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        };
    </script>
</body>
</html>
