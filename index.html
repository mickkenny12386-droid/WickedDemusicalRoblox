<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moulin Rouge! | The Spectacular Musical</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@1,700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --rouge: #4a0404; --bright-red: #bc0000; --gold: #d4af37; --black: #0a0a0a; }
        body { background: radial-gradient(circle, var(--rouge) 0%, var(--black) 100%); color: white; font-family: 'Montserrat', sans-serif; margin: 0; min-height: 100vh; transition: opacity 0.5s; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Cinzel Decorative'; color: var(--gold); font-size: 1.5rem; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .nav-links a:hover { color: var(--gold); }

        section { padding: 40px 10%; display: none; }
        .active { display: block; }
        .glow-title { font-family: 'Cinzel Decorative'; color: var(--gold); text-shadow: 0 0 15px var(--bright-red); text-align: center; font-size: 3rem; }

        /* Agenda */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
        .day { background: rgba(0,0,0,0.5); border: 1px solid #333; min-height: 100px; padding: 10px; cursor: pointer; position: relative; }
        .day:hover { border-color: var(--gold); }
        .has-show { border: 1px solid var(--bright-red); background: rgba(188,0,0,0.1); }

        /* Ticket Overlay */
        #ticket-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .window { background: var(--rouge); border: 3px solid var(--gold); padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center; }
        .tier { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 10px; margin: 10px 0; border: 1px solid var(--gold); }
        
        /* My Tickets Wallet */
        .ticket-item { background: white; color: black; padding: 15px; margin: 10px 0; border-left: 10px solid var(--bright-red); border-radius: 5px; font-family: 'Courier New', monospace; }

        /* Admin & Forms */
        .admin-box { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); padding: 20px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid var(--gold); color: white; box-sizing: border-box; }
        .btn { background: var(--bright-red); color: white; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<nav>
    <div class="logo">MOULIN ROUGE!</div>
    <div class="nav-links">
        <a onclick="showPage('home')" id="nav-home">Home</a>
        <a onclick="showPage('casting')" id="nav-casting">Casting</a>
        <a onclick="showPage('tickets')" id="nav-tickets">Tickets</a>
        <a onclick="showPage('my-tickets')" id="nav-wallet">My Tickets (<span id="ticket-count">0</span>)</a>
        <a onclick="adminLogin()" id="nav-club">Club</a>
        <div onclick="nextLang()" style="cursor:pointer; color:var(--gold); font-weight:bold;" id="lang-btn">NL ⌵</div>
    </div>
</nav>

<section id="home" class="active">
    <h1 class="glow-title" id="home-title">WELCOME</h1>
    <div id="info-feed" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;"></div>
</section>

<section id="casting">
    <h1 class="glow-title" id="cast-title">AUDITIONS</h1>
    <div class="admin-box" style="max-width:500px; margin: 0 auto;">
        <input type="text" id="c-disc" placeholder="Discord Name">
        <input type="text" id="c-rob" placeholder="Roblox Name">
        <select id="c-role"><option>Christian</option><option>Satine</option><option>Zidler</option></select>
        <textarea id="c-exp" placeholder="What is your experience?"></textarea>
        <p>Rehearsals? <select id="c-reh"><option>Yes</option><option>No</option></select></p>
        <button class="btn" onclick="submitAudition()">APPLY</button>
    </div>
</section>

<section id="tickets">
    <h1 class="glow-title">APRIL 2026</h1>
    <div class="calendar" id="calendar-grid"></div>
</section>

<section id="my-tickets">
    <h1 class="glow-title">YOUR WALLET</h1>
    <div id="wallet-list" style="max-width: 600px; margin: 0 auto;"></div>
</section>

<div id="ticket-overlay">
    <div class="window">
        <h2 id="sel-date" style="font-family:'Cinzel Decorative';">DATE</h2>
        <div id="tier-options"></div>
        <button class="btn" style="background:#333; margin-top:10px;" onclick="closeOverlay()">CANCEL</button>
    </div>
</div>

<section id="dashboard">
    <h1 class="glow-title">DASHBOARD</h1>
    <div class="admin-box">
        <h3>Add Show/Info</h3>
        <input type="number" id="d-day" placeholder="Day (1-30)">
        <input type="text" id="d-title" placeholder="Title/Info">
        <button class="btn" onclick="addShow()">Add Show</button>
        <button class="btn" style="margin-top:10px; background:var(--gold); color:black;" onclick="addInfo()">Post Info</button>
    </div>
    <div class="admin-box">
        <h3>Auditions</h3>
        <div id="admin-auditions"></div>
    </div>
</section>

<script>
    let currentLang = 'NL';
    let myTickets = [];
    let shows = {};
    let info = [];
    let auditions = [];
    let isAdmin = false;

    const CAP = { cancan: 24, rang1: 76, diamond: 260, bohemian: 96 };

    const translations = {
        NL: { home: "Home", casting: "Auditie", tickets: "Tickets", wallet: "Mijn Tickets", homeT: "WELKOM", apply: "SOLLICITEER", exp: "Wat is je ervaring?" },
        EN: { home: "Home", casting: "Casting", tickets: "Tickets", wallet: "My Tickets", homeT: "WELCOME", apply: "APPLY", exp: "Experience?" },
        DE: { home: "Startseite", casting: "Besetzung", tickets: "Karten", wallet: "Meine Tickets", homeT: "WILLKOMMEN", apply: "BEWERBEN", exp: "Erfahrung?" }
    };

    function showPage(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function adminLogin() {
        if(prompt("Password:") === "Virtual2025!") { isAdmin = true; showPage('dashboard'); }
    }

    // TICKET LOGICA
    function initCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        for(let i=1; i<=30; i++) {
            grid.innerHTML += `<div class="day ${shows[i]?'has-show':''}" onclick="openShow(${i})">${i}${shows[i]?'<br><small>SHOW</small>':''}</div>`;
        }
    }

    function openShow(day) {
        if(!shows[day]) return;
        document.getElementById('sel-date').innerText = `APRIL ${day}, 2026`;
        const s = shows[day];
        let html = '';
        const categories = [
            {id: 'cancan', name: 'Can-Can Seats', p: 10, multi: false},
            {id: 'rang1', name: 'Rang 1', p: 0, multi: true},
            {id: 'diamond', name: 'Diamond', p: 0, multi: true},
            {id: 'bohemian', name: 'Bohemians', p: 0, multi: true}
        ];

        categories.forEach(cat => {
            const left = CAP[cat.id] - s.sold[cat.id];
            html += `<div class="tier">
                <div style="text-align:left;"><b>${cat.name}</b><br><small>${left} left</small></div>
                <div>
                    ${left > 0 ? (cat.multi ? 
                        `<select id="qty-${cat.id}"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>` : 
                        `1x`) : ''}
                    <button class="btn" style="width:auto; padding:5px 10px;" ${left <= 0 ? 'disabled' : ''} onclick="buy(${day}, '${cat.id}')">
                        ${left > 0 ? 'BUY' : 'SOLD OUT'}
                    </button>
                </div>
            </div>`;
        });
        document.getElementById('tier-options').innerHTML = html;
        document.getElementById('ticket-overlay').style.display = 'flex';
    }

    function buy(day, cat) {
        const qty = document.getElementById(`qty-${cat}`) ? parseInt(document.getElementById(`qty-${cat}`).value) : 1;
        if(myTickets.length + qty > 5) return alert("Maximum 5 tickets total!");
        
        for(let i=0; i<qty; i++) {
            shows[day].sold[cat]++;
            myTickets.push({ day, cat, id: Math.random().toString(36).substr(2, 9).toUpperCase() });
        }
        
        document.getElementById('ticket-count').innerText = myTickets.length;
        renderWallet();
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        closeOverlay();
    }

    function renderWallet() {
        const list = document.getElementById('wallet-list');
        list.innerHTML = myTickets.map(t => `
            <div class="ticket-item">
                <div style="font-size:1.2rem; font-weight:bold;">MOULIN ROUGE!</div>
                <div>DATE: APRIL ${t.day}, 2026</div>
                <div>SEAT: ${t.cat.toUpperCase()}</div>
                <div style="margin-top:10px; border-top:1px dashed #ccc; padding-top:5px; font-size:0.7rem;">ID: ${t.id}</div>
            </div>
        `).join('');
    }

    function closeOverlay() { document.getElementById('ticket-overlay').style.display = 'none'; }

    // DASHBOARD & INFO
    function addShow() {
        const d = document.getElementById('d-day').value;
        shows[d] = { sold: { cancan:0, rang1:0, diamond:0, bohemian:0 } };
        initCalendar();
    }

    function addInfo() {
        info.push({ title: document.getElementById('d-title').value, id: Date.now() });
        renderHome();
    }

    function renderHome() {
        document.getElementById('info-feed').innerHTML = info.map(i => `
            <div class="admin-box">
                <h3>${i.title}</h3>
                ${isAdmin ? `<button onclick="deleteInfo(${i.id})" style="color:red; background:none; border:none; cursor:pointer;">[DELETE]</button>` : ''}
            </div>
        `).join('');
    }

    function deleteInfo(id) { info = info.filter(x => x.id !== id); renderHome(); }

    function submitAudition() {
        auditions.push({ disc: document.getElementById('c-disc').value, rob: document.getElementById('c-rob').value, exp: document.getElementById('c-exp').value });
        alert("Sent!");
        renderAuditions();
    }

    function renderAuditions() {
        document.getElementById('admin-auditions').innerHTML = auditions.map(a => `<div><b>${a.rob}</b>: ${a.exp}</div>`).join('<hr>');
    }

    // VERTALING
    function nextLang() {
        const langs = ['NL', 'EN', 'DE'];
        currentLang = langs[(langs.indexOf(currentLang) + 1) % 3];
        document.getElementById('lang-btn').innerText = currentLang + " ⌵";
        
        confetti({ particleCount: 100, colors: ['#ffffff', '#ff0000', '#d4af37'] });
        document.body.style.opacity = 0;
        
        setTimeout(() => {
            const t = translations[currentLang];
            document.getElementById('nav-home').innerText = t.home;
            document.getElementById('nav-casting').innerText = t.casting;
            document.getElementById('nav-tickets').innerText = t.tickets;
            document.getElementById('nav-wallet').innerText = `${t.wallet} (${myTickets.length})`;
            document.getElementById('home-title').innerText = t.homeT;
            document.getElementById('c-exp').placeholder = t.exp;
            document.body.style.opacity = 1;
        }, 500);
    }

    initCalendar();
</script>
</body>
</html>
