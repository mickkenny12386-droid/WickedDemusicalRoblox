<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked Official | The Emerald Experience</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --emerald: #97d72e; 
            --gold: #d4af37;
            --glass: rgba(0, 0, 0, 0.85); 
            --border: rgba(151, 215, 46, 0.3); 
        }

        body { 
            margin: 0; 
            background: linear-gradient(180deg, #050505 0%, #000 70%, #1a3300 100%); 
            background-attachment: fixed; 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
        }

        /* Navigatie Upgrade */
        nav { 
            background: rgba(0,0,0,0.95); 
            padding: 15px 60px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid var(--emerald); 
            box-shadow: 0 5px 20px rgba(0,255,0,0.2);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-family: 'Cinzel'; font-size: 28px; letter-spacing: 5px; text-shadow: 0 0 10px var(--emerald); }
        .nav-links a { color: var(--emerald); text-decoration: none; font-weight: 600; font-size: 12px; text-transform: uppercase; cursor: pointer; margin-left: 20px; transition: 0.3s; }
        .nav-links a:hover { color: white; text-shadow: 0 0 8px var(--emerald); }

        .container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        
        /* Sectie Stijl */
        .section-box { 
            background: var(--glass); 
            border: 1px solid var(--border); 
            padding: 50px; 
            border-radius: 15px; 
            display: none; 
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }
        .section-box.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-family: 'Cinzel'; font-size: 32px; color: var(--emerald); margin-bottom: 30px; border-bottom: 1px solid var(--border); }

        /* Newsletter Cards */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .news-card { 
            background: rgba(255,255,255,0.03); 
            border-radius: 10px; 
            overflow: hidden; 
            border: 1px solid #222; 
            transition: 0.4s;
        }
        .news-card:hover { transform: scale(1.02); border-color: var(--emerald); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .news-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid var(--emerald); }
        .news-content { padding: 20px; }
        .news-content h3 { font-family: 'Playfair Display'; margin: 0; color: var(--gold); }

        /* Input Styles */
        input, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; 
            background: rgba(255,255,255,0.05); border: 1px solid #333; 
            color: white; border-radius: 5px; font-family: inherit;
        }
        input:focus { border-color: var(--emerald); outline: none; }

        .btn { 
            background: var(--emerald); color: black; padding: 15px; 
            border: none; font-weight: 800; cursor: pointer; 
            border-radius: 5px; text-transform: uppercase; width: 100%;
            letter-spacing: 2px;
        }
        .btn:hover { background: white; box-shadow: 0 0 20px var(--emerald); }
        .logout-btn { background: #660000; color: white; padding: 5px 10px; font-size: 10px; margin-left: 10px; border-radius: 3px; cursor: pointer; }

        .admin-card { background: #0a0a0a; padding: 20px; border: 1px solid gold; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">WICKED <span style="color: var(--emerald);">NL</span></div>
        <div class="nav-links">
            <a onclick="showSection('theshow')">The Show</a>
            <a onclick="showSection('newsletter')">News</a>
            <a onclick="showSection('yourvisit')">Tickets</a>
            <a onclick="showSection('audities')">Auditions</a>
            <a id="admin-link" style="display:none; color:gold;" onclick="showSection('admin')">Admin</a>
            <span id="user-info" style="font-size: 11px; margin-left: 20px;"></span>
            <a id="login-nav" onclick="showSection('auth-section')">Log In</a>
            <button id="logout-nav" class="logout-btn" style="display:none;" onclick="logoutUser()">Logout</button>
        </div>
    </nav>

    <div class="container">
        
        <section id="newsletter" class="section-box active">
            <h2>Emerald City Times</h2>
            <div id="news-container" class="news-grid">
                </div>
        </section>

        <section id="auth-section" class="section-box">
            <h2>Join the Rebellion</h2>
            <input type="email" id="email" placeholder="Glinda@Oz.com">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleAuth('login')">Enter Oz</button>
            <button class="btn" style="background:transparent; color:white; border:1px solid white;" onclick="handleAuth('signup')">Create Account</button>
            <p style="text-align:center; color:gold; margin-top:30px; cursor:pointer;" onclick="adminPrompt()">Witch Master Access</p>
        </section>

        <section id="audities" class="section-box">
            <h2>Stage Door Auditions</h2>
            <div id="aud-form">
                <input type="text" id="aud-role" placeholder="Target Role">
                <textarea id="aud-exp" placeholder="Your theatrical background..."></textarea>
                <button class="btn" onclick="submitAudition()">Submit for Review</button>
            </div>
            <div id="aud-status" style="display:none;"></div>
        </section>

        <section id="admin" class="section-box">
            <h2 style="color:gold;">The Wizard's Control</h2>
            <button class="btn" style="background:red; color:white; width:auto; padding:5px 15px; margin-bottom:20px;" onclick="adminLogout()">Exit Admin Mode</button>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
                <div class="admin-card">
                    <h3>Write Newsletter</h3>
                    <input type="text" id="news-title" placeholder="Article Title">
                    <input type="text" id="news-img-url" placeholder="Image URL (e.g. https://...)">
                    <textarea id="news-text" placeholder="Tell the story..."></textarea>
                    <button class="btn" onclick="postNews()">Post to Emerald City</button>
                </div>

                <div class="admin-card">
                    <h3>Manage Shows</h3>
                    <input type="number" id="show-day" placeholder="Day">
                    <input type="text" id="show-time" placeholder="Time (e.g. 19:30)">
                    <button class="btn" onclick="addShow()">Add Performance</button>
                    <div id="admin-shows" style="margin-top:20px;"></div>
                </div>
            </div>
        </section>

        <section id="theshow" class="section-box"><h2>Performance Schedule</h2><div id="calendar-ui" class="news-grid"></div></section>
        <section id="yourvisit" class="section-box"><h2>Your Enchanted Tickets</h2><div id="tickets-list"></div></section>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCm6vZCE1KH1SnclU7NHF2BmeOUW_suio",
            authDomain: "wickedrobloxofficial.firebaseapp.com",
            projectId: "wickedrobloxofficial",
            storageBucket: "wickedrobloxofficial.firebasestorage.app",
            messagingSenderId: "107452125942",
            appId: "1:107452125942:web:ca9c1222469fa41b1992d7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function showSection(id) {
            document.querySelectorAll('.section-box').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- AUTH & LOGOUT ---
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                if(type === 'signup') await auth.createUserWithEmailAndPassword(email, pass);
                else await auth.signInWithEmailAndPassword(email, pass);
                location.reload();
            } catch(e) { alert(e.message); }
        }

        function logoutUser() {
            auth.signOut();
            location.reload();
        }

        function adminPrompt() {
            if(prompt("Identity Key:") === "Virtualentertainment2025!") {
                localStorage.setItem('wicked_admin', 'true');
                location.reload();
            }
        }

        function adminLogout() {
            localStorage.removeItem('wicked_admin');
            location.reload();
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('user-info').innerText = "Logged in: " + user.email;
                document.getElementById('login-nav').style.display = 'none';
                document.getElementById('logout-nav').style.display = 'inline-block';
                loadUserTickets(user.uid);
            }
            if(localStorage.getItem('wicked_admin') === 'true') {
                document.getElementById('admin-link').style.display = 'inline-block';
                loadAdminTools();
            }
        });

        // --- NEWSLETTER SYSTEEM ---
        async function postNews() {
            const title = document.getElementById('news-title').value;
            const img = document.getElementById('news-img-url').value;
            const text = document.getElementById('news-text').value;
            await db.collection('newsletter').add({ title, img, text, date: new Date().toLocaleDateString() });
            alert("Published!");
            loadNews();
        }

        async function loadNews() {
            const container = document.getElementById('news-container');
            const snap = await db.collection('newsletter').orderBy('date', 'desc').get();
            container.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `
                    <div class="news-card">
                        <img src="${d.img || 'https://via.placeholder.com/300x200?text=Wicked'}" class="news-img">
                        <div class="news-content">
                            <small>${d.date}</small>
                            <h3>${d.title}</h3>
                            <p>${d.text}</p>
                        </div>
                    </div>`;
            });
        }

        // --- ADMIN TOOLS ---
        async function loadAdminTools() {
            const showList = document.getElementById('admin-shows');
            const snap = await db.collection('shows').get();
            showList.innerHTML = '';
            snap.forEach(doc => {
                showList.innerHTML += `
                    <div style="background:#222; padding:10px; margin-top:5px; display:flex; justify-content:space-between;">
                        <span>${doc.data().day} March - ${doc.data().time}</span>
                        <button style="color:red; background:none; border:none; cursor:pointer;" onclick="deleteShow('${doc.id}')">X</button>
                    </div>`;
            });
        }

        async function deleteShow(id) {
            await db.collection('shows').doc(id).delete();
            loadAdminTools();
        }

        async function addShow() {
            await db.collection('shows').add({
                day: parseInt(document.getElementById('show-day').value),
                time: document.getElementById('show-time').value
            });
            loadAdminTools();
        }

        // --- OPSTART ---
        loadNews();
    </script>
</body>
</html>
