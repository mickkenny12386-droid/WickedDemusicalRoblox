<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked Official | Emerald Management</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --emerald: #97d72e; --gold: #d4af37; --glass: rgba(0, 0, 0, 0.95); --border: rgba(151, 215, 46, 0.4); }
        body { margin: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; background-image: linear-gradient(180deg, #000 0%, #050505 70%, #1a3300 100%); background-attachment: fixed; }
        
        nav { background: rgba(0,0,0,0.98); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emerald); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Cinzel'; font-size: 22px; letter-spacing: 3px; }
        .nav-links a { color: var(--emerald); text-decoration: none; font-weight: 600; font-size: 11px; text-transform: uppercase; cursor: pointer; margin-left: 15px; }

        .container { max-width: 1100px; margin: 30px auto; padding: 20px; }
        .section-box { background: var(--glass); border: 1px solid var(--border); padding: 35px; border-radius: 12px; display: none; backdrop-filter: blur(10px); }
        .section-box.active { display: block; animation: fadeIn 0.3s ease; }

        .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 8px; overflow: hidden; padding: 15px; text-align: center; }
        .card h3 { color: var(--gold); margin-bottom: 5px; }

        input, textarea { width: 100%; padding: 10px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn { background: var(--emerald); color: black; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; width: 100%; }
        
        .admin-item { background: #111; padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">WICKED <span style="color: var(--emerald);">NL</span></div>
        <div class="nav-links">
            <a onclick="showSection('theshow')">Schedule</a>
            <a onclick="showSection('newsletter')">News</a>
            <a onclick="showSection('cast-page')">Cast</a>
            <a onclick="showSection('audities')">Auditions</a>
            <a id="admin-nav" style="display:none; color:gold;" onclick="showSection('admin-box')">Admin Panel</a>
            <a id="auth-nav" onclick="showSection('login-box')">Login</a>
        </div>
    </nav>

    <div class="container">
        
        <section id="cast-page" class="section-box active">
            <h2>The Cast of Oz</h2>
            <div id="cast-container" class="grid-3"></div>
        </section>

        <section id="audities" class="section-box">
            <h2>Audition for a Role</h2>
            <div id="aud-form">
                <input type="text" id="aud-discord" placeholder="Discord Username (Required)">
                <input type="text" id="aud-role" placeholder="Role you want">
                <textarea id="aud-exp" placeholder="Your Experience..."></textarea>
                <button class="btn" onclick="submitAudition()">Submit Application</button>
            </div>
        </section>

        <section id="admin-box" class="section-box" style="border: 2px solid gold;">
            <h2 style="color:gold;">Witch Master Control</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div>
                    <h3>Add Cast Member</h3>
                    <input type="text" id="adm-cast-role" placeholder="Role Name">
                    <input type="text" id="adm-cast-name" placeholder="Actor Name">
                    <button class="btn" onclick="addCast()">Save Cast Member</button>
                    
                    <h3 style="margin-top:20px;">Add Show</h3>
                    <input type="number" id="adm-day" placeholder="Day (March)">
                    <input type="text" id="adm-time" placeholder="Time">
                    <button class="btn" onclick="addShow()">Add Show</button>
                </div>
                <div>
                    <h3>Management Lists</h3>
                    <div id="admin-lists" style="max-height:450px; overflow-y:auto; background:rgba(0,0,0,0.5); padding:10px;">
                        </div>
                </div>
            </div>
            <button class="btn" style="background:red; color:white; margin-top:20px;" onclick="adminLogout()">Logout Admin</button>
        </section>

        <section id="login-box" class="section-box">
            <h2>Identity Check</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="authAction('login')">Login</button>
            <button class="btn" style="background:none; border:1px solid white; color:white;" onclick="authAction('signup')">Sign Up</button>
            <p onclick="adminGate()" style="text-align:center; color:gold; cursor:pointer; margin-top:20px;">Admin Login</p>
        </section>

        <section id="theshow" class="section-box"><h2>Performance Schedule</h2><div id="calendar" class="calendar-grid"></div></section>
        <section id="newsletter" class="section-box"><h2>Emerald City Times</h2><div id="news-container" class="grid-3"></div></section>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCm6vZCE1KH1SnclU7NHF2BmeOUW_suio",
            authDomain: "wickedrobloxofficial.firebaseapp.com",
            projectId: "wickedrobloxofficial",
            storageBucket: "wickedrobloxofficial.firebasestorage.app",
            messagingSenderId: "107452125942",
            appId: "1:107452125942:web:ca9c1222469fa41b1992d7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function showSection(id) {
            document.querySelectorAll('.section-box').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- CAST & AUDITIONS ---
        async function addCast() {
            const role = document.getElementById('adm-cast-role').value;
            const name = document.getElementById('adm-cast-name').value;
            if(!role || !name) return alert("Fill in all fields");
            await db.collection('cast').add({ role, name, timestamp: Date.now() });
            loadAdminData();
        }

        async function submitAudition() {
            const discord = document.getElementById('aud-discord').value;
            if(!discord) return alert("Discord username is required!");
            await db.collection('auditions').add({
                discord,
                role: document.getElementById('aud-role').value,
                exp: document.getElementById('aud-exp').value,
                timestamp: Date.now()
            });
            alert("Application Sent!");
        }

        // --- DATA LOADERS ---
        function loadLiveContent() {
            // Public Cast Page
            db.collection('cast').orderBy('timestamp').onSnapshot(snap => {
                const container = document.getElementById('cast-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    container.innerHTML += `<div class="card"><h3>${doc.data().role}</h3><p>${doc.data().name}</p></div>`;
                });
            });

            // Schedule & Newsletter logic remains connected...
        }

        async function loadAdminData() {
            const list = document.getElementById('admin-lists');
            list.innerHTML = "<h4>Current Cast</h4>";
            const castSnap = await db.collection('cast').get();
            castSnap.forEach(doc => {
                list.innerHTML += `<div class="admin-item">${doc.data().role}: ${doc.data().name} <button class="del-btn" onclick="deleteDoc('cast','${doc.id}')">X</button></div>`;
            });

            list.innerHTML += "<h4 style='margin-top:20px;'>Pending Auditions</h4>";
            const audSnap = await db.collection('auditions').get();
            audSnap.forEach(doc => {
                list.innerHTML += `<div class="admin-item">${doc.data().discord} (${doc.data().role}) <button class="del-btn" onclick="deleteDoc('auditions','${doc.id}')">X</button></div>`;
            });

            list.innerHTML += "<h4 style='margin-top:20px;'>Shows</h4>";
            const showSnap = await db.collection('shows').get();
            showSnap.forEach(doc => {
                list.innerHTML += `<div class="admin-item">${doc.data().day} March <button class="del-btn" onclick="deleteDoc('shows','${doc.id}')">X</button></div>`;
            });
        }

        async function deleteDoc(col, id) {
            if(confirm("Delete this entry?")) {
                await db.collection(col).doc(id).delete();
                loadAdminData();
            }
        }

        async function addShow() {
            await db.collection('shows').add({
                day: document.getElementById('adm-day').value,
                time: document.getElementById('adm-time').value
            });
            loadAdminData();
        }

        // --- AUTH & ADMIN ---
        function adminGate() {
            if(prompt("Admin Key:") === "Virtualentertainment2025!") {
                localStorage.setItem('wicked_admin', 'true');
                location.reload();
            }
        }
        function adminLogout() { localStorage.removeItem('wicked_admin'); location.reload(); }

        auth.onAuthStateChanged(user => {
            if(user) document.getElementById('auth-nav').innerText = "Account";
            if(localStorage.getItem('wicked_admin') === 'true') {
                document.getElementById('admin-nav').style.display = 'block';
                loadAdminData();
            }
        });

        async function authAction(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                if(type === 'login') await auth.signInWithEmailAndPassword(e, p);
                else await auth.createUserWithEmailAndPassword(e, p);
                location.reload();
            } catch(err) { alert(err.message); }
        }

        loadLiveContent();
    </script>
</body>
</html>
