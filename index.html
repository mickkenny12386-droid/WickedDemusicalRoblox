<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Awards | Excellence in Theater</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Oswald:wght@300;500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; --gold-bright: #f9e29b; --black-deep: #050505; 
            --black-soft: #121212; --white: #ffffff; --danger: #8b0000;
        }
        
        body { 
            background: var(--black-deep); color: var(--white); font-family: 'Montserrat', sans-serif; 
            margin: 0; background-image: radial-gradient(circle at top, #1a150a 0%, #050505 100%);
            min-height: 100vh;
        }

        /* Nav */
        nav { 
            display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.3); background: rgba(0,0,0,0.95);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.8rem; letter-spacing: 4px; }
        .nav-links a { color: var(--white); text-decoration: none; margin-left: 30px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 0.8rem; }
        .nav-links a:hover { color: var(--gold); }

        section { padding: 60px 8%; display: none; }
        .active { display: block; animation: pageIn 0.6s ease-out; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-family: 'Oswald', sans-serif; font-size: 2.5rem; text-align: center; color: var(--gold); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }

        /* UI Elements */
        .luxury-box { background: var(--black-soft); border: 1px solid var(--gold); padding: 40px; max-width: 750px; margin: 0 auto; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .show-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .show-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(212, 175, 55, 0.2); padding: 30px; text-align: center; transition: 0.4s; }
        .show-card:hover { border-color: var(--gold); transform: translateY(-5px); background: rgba(212,175,55,0.05); }

        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; box-sizing: border-box; }
        .btn { background: var(--gold); color: black; border: none; padding: 15px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn:hover { background: white; box-shadow: 0 0 20px var(--gold); }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }

        /* Seating Chart V2 */
        .seating-area { background: rgba(0,0,0,0.4); padding: 50px 20px; border-radius: 10px; border: 1px solid #222; position: relative; }
        .stage-visual { 
            width: 70%; height: 40px; background: linear-gradient(to bottom, var(--gold), #886b1c); 
            margin: 0 auto 60px auto; border-radius: 0 0 100px 100px; 
            display: flex; align-items: center; justify-content: center;
            color: black; font-family: 'Oswald'; font-size: 0.8rem; letter-spacing: 5px;
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2);
        }

        .seat-grid { display: grid; gap: 8px; justify-content: center; perspective: 1000px; }
        
        .seat { 
            width: 28px; height: 28px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 4px 4px 8px 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 0.6rem; 
            cursor: pointer; transition: 0.3s; position: relative; background: #111;
        }
        .seat:hover:not(.occupied):not(.blocked) { background: var(--gold); transform: translateY(-3px) scale(1.1); color: black; }
        .seat.selected { background: var(--white); color: black; box-shadow: 0 0 20px var(--white); border-color: white; }
        .seat.occupied { background: #333; border-color: #444; color: #555; cursor: not-allowed; }
        .seat.blocked { background: #400; border-color: #ff0000; color: #900; cursor: not-allowed; }

        /* Theater Curved Rows */
        .theater-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 5px; }
        
        /* Conference U-Shape Improved */
        .u-layout { display: flex; gap: 60px; justify-content: center; align-items: flex-start; }
        .u-side { display: grid; grid-template-columns: 1fr; gap: 6px; }
        .u-back { display: grid; grid-template-columns: repeat(14, 1fr); gap: 6px; padding-top: 20px; }

        .legend { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; font-size: 0.7rem; color: #888; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .l-box { width: 12px; height: 12px; border-radius: 2px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">MUSICAL AWARDS</div>
    <div class="nav-links">
        <a onclick="showPage('home')">HOME</a>
        <a onclick="authAdmin()">OWNER PANEL</a>
    </div>
</nav>

<section id="home" class="active">
    <h1 class="section-title">Ticket Shop</h1>
    <div id="show-list" class="show-grid"></div>
</section>

<section id="booking-login">
    <div class="luxury-box">
        <h2 style="color:var(--gold); font-family:'Oswald';">USER DETAILS</h2>
        <input type="text" id="user-discord" placeholder="Discord Username (e.g., Name#0000)">
        <input type="text" id="user-roblox" placeholder="Roblox Username">
        <button class="btn" onclick="openSeating()">CHOOSE YOUR SEAT</button>
    </div>
</section>

<section id="seating">
    <h1 class="section-title" style="font-size:1.8rem;">Select Your Seat</h1>
    
    <div class="legend">
        <div class="legend-item"><div class="l-box" style="border:1px solid var(--gold)"></div> Available</div>
        <div class="legend-item"><div class="l-box" style="background:#333"></div> Occupied</div>
        <div class="legend-item"><div class="l-box" style="background:#400"></div> Blocked</div>
        <div class="legend-item"><div class="l-box" style="background:white"></div> Selected</div>
    </div>

    <div class="seating-area">
        <div class="stage-visual">STAGE / SCREEN</div>
        <div id="chart-render"></div>
        
        <div style="text-align:center; margin-top:40px;">
            <p style="font-size:0.9rem;">Seat: <span id="selected-seat-display" style="color:var(--gold); font-weight:bold; font-size:1.2rem;">-</span></p>
            <button class="btn" style="max-width:300px;" onclick="confirmBooking()">CONFIRM & BOOK</button>
        </div>
    </div>
</section>

<section id="admin">
    <h1 class="section-title">Owner Dashboard</h1>
    <div class="luxury-box">
        <h3>Create New Show</h3>
        <input type="text" id="new-name" placeholder="Show Title">
        <input type="date" id="new-date">
        <select id="new-venue" onchange="previewAdmin()">
            <option value="theater">Grand Theater (7 Rows x 12 Seats)</option>
            <option value="conference">Conference Hall (U-Shape Setup)</option>
        </select>
        <p style="font-size:0.7rem; color:var(--gold); margin-top:20px;">CLICK TO BLOCK SEATS FOR STAFF/VIP:</p>
        <div id="admin-preview" style="transform:scale(0.8);"></div>
        <button class="btn" onclick="saveShow()">PUBLISH SHOW</button>
    </div>
    
    <h2 class="section-title" style="font-size:1.5rem; margin-top:60px;">Manage Existing Shows</h2>
    <div id="admin-manage-list" class="show-grid"></div>
</section>

<script>
    let shows = JSON.parse(localStorage.getItem('ma_shows_v2')) || [];
    let currentShow = null;
    let selectedSeat = null;
    let blockedSeats = [];
    const WEBHOOK = "https://discord.com/api/webhooks/1495954546743316644/QkS7uzzhImZ9nSZuVzLe113MMQ9X9xqsvdePzpxSEiq66DxneFRINjvxOKfcnhwBLmvx";

    function showPage(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function authAdmin() {
        if(prompt("Owner Password:") === "firsteditionmusical") {
            showPage('admin'); renderAdminList(); previewAdmin();
        } else alert("Invalid Password");
    }

    // --- SEATING ENGINE ---

    function renderVenue(venue, container, isAdmin, showData = null) {
        container.innerHTML = '';
        if(venue === 'theater') {
            for(let r=1; r<=7; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'theater-row';
                for(let s=1; s<=12; s++) {
                    const label = `Row ${r}-S${s}`;
                    createSeat(label, s, rowDiv, isAdmin, showData);
                }
                container.appendChild(rowDiv);
            }
        } else {
            const uWrap = document.createElement('div'); uWrap.className = 'u-layout';
            const L = document.createElement('div'); L.className = 'u-side';
            const B = document.createElement('div'); B.className = 'u-back';
            const R = document.createElement('div'); R.className = 'u-side';
            
            for(let i=1; i<=12; i++) createSeat(`Left-${i}`, i, L, isAdmin, showData);
            for(let i=1; i<=28; i++) createSeat(`Back-${i}`, i, B, isAdmin, showData);
            for(let i=1; i<=12; i++) createSeat(`Right-${i}`, i, R, isAdmin, showData);
            
            uWrap.append(L, B, R); container.appendChild(uWrap);
        }
    }

    function createSeat(label, num, container, isAdmin, data) {
        const s = document.createElement('div'); s.className = 'seat'; s.innerText = num;
        if(data) {
            if(data.blocked?.includes(label)) s.classList.add('blocked');
            if(data.occupied?.includes(label)) s.classList.add('occupied');
        }
        s.onclick = () => {
            if(isAdmin) {
                s.classList.toggle('blocked');
                if(s.classList.contains('blocked')) blockedSeats.push(label);
                else blockedSeats = blockedSeats.filter(x => x !== label);
            } else {
                if(s.classList.contains('occupied') || s.classList.contains('blocked')) return;
                document.querySelectorAll('.seat').forEach(x => x.classList.remove('selected'));
                s.classList.add('selected'); selectedSeat = label;
                document.getElementById('selected-seat-display').innerText = label;
            }
        };
        container.appendChild(s);
    }

    // --- LOGIC ---

    function previewAdmin() {
        blockedSeats = [];
        renderVenue(document.getElementById('new-venue').value, document.getElementById('admin-preview'), true);
    }

    function saveShow() {
        const name = document.getElementById('new-name').value;
        const date = document.getElementById('new-date').value;
        if(!name || !date) return alert("Fill all fields");
        shows.push({ id: Date.now(), name, date, venue: document.getElementById('new-venue').value, blocked: [...blockedSeats], occupied: [] });
        updateAll(); alert("Show Published!");
    }

    function deleteShow(id) {
        if(confirm("Delete this show?")) {
            shows = shows.filter(s => s.id !== id);
            updateAll();
        }
    }

    function updateAll() {
        localStorage.setItem('ma_shows_v2', JSON.stringify(shows));
        renderHome(); renderAdminList();
    }

    function renderHome() {
        document.getElementById('show-list').innerHTML = shows.map(s => `
            <div class="show-card">
                <h3 style="color:var(--gold); font-family:'Oswald'; margin:0;">${s.name}</h3>
                <p style="font-size:0.8rem; opacity:0.6;">${s.date}</p>
                <button class="btn btn-outline" onclick="startBooking(${s.id})">BOOK NOW</button>
            </div>`).join('');
    }

    function renderAdminList() {
        document.getElementById('admin-manage-list').innerHTML = shows.map(s => `
            <div class="show-card" style="padding:15px;">
                <h4 style="margin:0; font-size:0.9rem;">${s.name}</h4>
                <button class="btn btn-outline" style="color:red; border-color:#400; margin-top:10px; font-size:0.6rem; padding:5px;" onclick="deleteShow(${s.id})">DELETE</button>
            </div>`).join('');
    }

    function startBooking(id) {
        currentShow = shows.find(s => s.id === id);
        showPage('booking-login');
    }

    function openSeating() {
        if(!document.getElementById('user-discord').value) return alert("Please enter your Discord name.");
        showPage('seating');
        renderVenue(currentShow.venue, document.getElementById('chart-render'), false, currentShow);
    }

    function confirmBooking() {
        if(!selectedSeat) return alert("Please select a seat.");
        currentShow.occupied.push(selectedSeat);
        
        fetch(WEBHOOK, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                embeds: [{
                    title: "🎟️ NEW TICKET RESERVED", color: 13936439,
                    fields: [
                        {name: "Show", value: currentShow.name, inline: true},
                        {name: "Seat", value: selectedSeat, inline: true},
                        {name: "Discord", value: document.getElementById('user-discord').value},
                        {name: "Roblox", value: document.getElementById('user-roblox').value}
                    ], footer: { text: "Musical Awards Automated System" }, timestamp: new Date()
                }]
            })
        }).then(() => {
            confetti({ particleCount: 150, colors: ['#d4af37', '#ffffff'] });
            alert("Reservation Complete! See you at the show.");
            updateAll(); showPage('home');
        });
    }

    renderHome();
</script>
</body>
</html>
