<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked Official | Emerald Management</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --emerald: #97d72e; --gold: #d4af37; --glass: rgba(0, 0, 0, 0.95); --border: rgba(151, 215, 46, 0.4); }
        body { margin: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; background-image: linear-gradient(180deg, #000 0%, #050505 70%, #1a3300 100%); background-attachment: fixed; }
        
        nav { background: rgba(0,0,0,0.98); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emerald); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Cinzel'; font-size: 22px; letter-spacing: 3px; }
        .nav-links a { color: var(--emerald); text-decoration: none; font-weight: 600; font-size: 11px; text-transform: uppercase; cursor: pointer; margin-left: 15px; }

        .container { max-width: 1100px; margin: 30px auto; padding: 20px; }
        .section-box { background: var(--glass); border: 1px solid var(--border); padding: 35px; border-radius: 12px; display: none; backdrop-filter: blur(10px); }
        .section-box.active { display: block; animation: fadeIn 0.3s ease; }

        /* Kalender */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 20px; }
        .day { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 10px; text-align: center; border-radius: 5px; }
        .day.has-show { border-color: var(--emerald); background: rgba(151, 215, 46, 0.15); cursor: pointer; }
        .day.has-show:hover { background: var(--emerald); color: black; }

        /* Grid & Cards */
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 8px; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-bottom: 2px solid var(--emerald); }
        .card-body { padding: 15px; }

        input, textarea { width: 100%; padding: 10px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn { background: var(--emerald); color: black; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; width: 100%; }
        
        .admin-item { background: #111; padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">WICKED <span style="color: var(--emerald);">NL</span></div>
        <div class="nav-links">
            <a onclick="showSection('theshow')">Schedule</a>
            <a onclick="showSection('newsletter')">News</a>
            <a onclick="showSection('cast-page')">Cast</a>
            <a onclick="showSection('yourvisit')">My Tickets</a>
            <a id="admin-nav" style="display:none; color:gold;" onclick="showSection('admin-box')">Admin Panel</a>
            <a id="auth-nav" onclick="showSection('login-box')">Login</a>
        </div>
    </nav>

    <div class="container">
        
        <section id="theshow" class="section-box active">
            <h2>Performance Schedule</h2>
            <div id="calendar" class="calendar-grid"></div>
            <div id="booking-ui" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
                <h3 id="selected-date-label" style="color:var(--emerald);"></h3>
                <input type="number" id="book-qty" value="1" min="1" max="10" style="width:100px;">
                <button class="btn" onclick="reserveTicket()">Reserveer Tickets</button>
            </div>
        </section>

        <section id="yourvisit" class="section-box">
            <h2>Your Enchanted Tickets</h2>
            <div id="my-tickets-container">Log in om je tickets te zien.</div>
        </section>

        <section id="newsletter" class="section-box">
            <h2>Emerald City News</h2>
            <div id="news-container" class="grid-3"></div>
        </section>

        <section id="cast-page" class="section-box">
            <h2>The Cast</h2>
            <div id="cast-container" class="grid-3"></div>
        </section>

        <section id="admin-box" class="section-box" style="border: 2px solid gold;">
            <h2 style="color:gold;">Witch Master Control</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div>
                    <h3>Management</h3>
                    <input type="number" id="adm-day" placeholder="Dag">
                    <input type="text" id="adm-time" placeholder="Tijd">
                    <button class="btn" onclick="addShow()">Show Toevoegen</button>
                    <hr>
                    <input type="text" id="adm-news-title" placeholder="News Title">
                    <input type="text" id="adm-news-img" placeholder="Img URL">
                    <textarea id="adm-news-text" placeholder="News text"></textarea>
                    <button class="btn" onclick="addNews()">News Posten</button>
                </div>
                <div>
                    <h3>Lijsten (Verwijderen)</h3>
                    <div id="admin-list-content" style="max-height:400px; overflow-y:auto;"></div>
                </div>
            </div>
            <button class="btn" style="background:red; color:white; margin-top:20px;" onclick="adminLogout()">Log uit Admin</button>
        </section>

        <section id="login-box" class="section-box">
            <h2>Identity Check</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="authAction('login')">Login</button>
            <button class="btn" style="background:none; border:1px solid white; color:white;" onclick="authAction('signup')">Create Account</button>
            <p onclick="adminGate()" style="text-align:center; color:gold; cursor:pointer; margin-top:20px;">Admin Access</p>
        </section>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCm6vZCE1KH1SnclU7NHF2BmeOUW_suio",
            authDomain: "wickedrobloxofficial.firebaseapp.com",
            projectId: "wickedrobloxofficial",
            storageBucket: "wickedrobloxofficial.firebasestorage.app",
            messagingSenderId: "107452125942",
            appId: "1:107452125942:web:ca9c1222469fa41b1992d7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let selectedDate = "";

        function showSection(id) {
            document.querySelectorAll('.section-box').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- TICKETS & SCHEDULE ---
        async function reserveTicket() {
            const user = auth.currentUser;
            if(!user) return alert("Je moet ingelogd zijn!");
            await db.collection('bookings').add({
                uid: user.uid,
                show: selectedDate,
                qty: document.getElementById('book-qty').value,
                timestamp: Date.now()
            });
            alert("Gereserveerd!");
            showSection('yourvisit');
        }

        function loadData() {
            // Schedule & Calendar
            db.collection('shows').onSnapshot(snap => {
                const cal = document.getElementById('calendar');
                const shows = {};
                snap.forEach(doc => shows[doc.data().day] = {time: doc.data().time, id: doc.id});
                cal.innerHTML = '';
                for(let i=1; i<=31; i++) {
                    const s = shows[i];
                    const d = document.createElement('div');
                    d.className = `day ${s ? 'has-show' : ''}`;
                    d.innerHTML = `${i}<br><small>${s ? s.time : ''}</small>`;
                    if(s) d.onclick = () => {
                        selectedDate = `${i} Maart - ${s.time}`;
                        document.getElementById('selected-date-label').innerText = "Datum: " + selectedDate;
                        document.getElementById('booking-ui').style.display = 'block';
                    };
                    cal.appendChild(d);
                }
            });

            // Newsletter
            db.collection('newsletter').onSnapshot(snap => {
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    container.innerHTML += `<div class="card"><img src="${d.img}">
                        <div class="card-body"><h3>${d.title}</h3><p>${d.text}</p></div></div>`;
                });
            });

            // My Tickets
            auth.onAuthStateChanged(user => {
                if(user) {
                    db.collection('bookings').where('uid', '==', user.uid).onSnapshot(snap => {
                        const container = document.getElementById('my-tickets-container');
                        container.innerHTML = snap.empty ? "Geen tickets gevonden." : "";
                        snap.forEach(doc => {
                            container.innerHTML += `<div class="admin-item" style="border-left:4px solid var(--emerald)">
                                <span><b>${doc.data().show}</b> - ${doc.data().qty} tickets</span>
                            </div>`;
                        });
                    });
                }
            });
        }

        // --- ADMIN FUNCTIES ---
        async function loadAdminList() {
            const container = document.getElementById('admin-list-content');
            container.innerHTML = "<h4>Lijsten beheren</h4>";
            
            // Shows
            const shows = await db.collection('shows').get();
            container.innerHTML += "<b>Shows:</b>";
            shows.forEach(doc => {
                container.innerHTML += `<div class="admin-item">${doc.data().day} Maart <button class="del-btn" onclick="deleteDoc('shows','${doc.id}')">X</button></div>`;
            });

            // News
            const news = await db.collection('newsletter').get();
            container.innerHTML += "<br><b>Newsletters:</b>";
            news.forEach(doc => {
                container.innerHTML += `<div class="admin-item">${doc.data().title} <button class="del-btn" onclick="deleteDoc('newsletter','${doc.id}')">X</button></div>`;
            });
        }

        async function deleteDoc(col, id) {
            if(confirm("Zeker weten?")) {
                await db.collection(col).doc(id).delete();
                loadAdminList();
            }
        }

        async function addShow() {
            await db.collection('shows').add({ day: document.getElementById('adm-day').value, time: document.getElementById('adm-time').value });
            loadAdminList();
        }

        async function addNews() {
            await db.collection('newsletter').add({ title: document.getElementById('adm-news-title').value, img: document.getElementById('adm-news-img').value, text: document.getElementById('adm-news-text').value });
            loadAdminList();
        }

        function adminGate() {
            if(prompt("Wachtwoord:") === "Virtualentertainment2025!") {
                localStorage.setItem('wicked_admin', 'true');
                location.reload();
            }
        }

        function adminLogout() { localStorage.removeItem('wicked_admin'); location.reload(); }

        auth.onAuthStateChanged(user => {
            if(user) document.getElementById('auth-nav').innerText = "Account";
            if(localStorage.getItem('wicked_admin') === 'true') {
                document.getElementById('admin-nav').style.display = 'block';
                loadAdminList();
            }
        });

        async function authAction(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                if(type === 'login') await auth.signInWithEmailAndPassword(e, p);
                else await auth.createUserWithEmailAndPassword(e, p);
                location.reload();
            } catch(err) { alert(err.message); }
        }

        loadData();
    </script>
</body>
</html>
