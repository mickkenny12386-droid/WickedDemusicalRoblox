<style>
    /* ... (bestaande navigatie en hero stijlen blijven gelijk) ... */

    .theater-container {
        position: relative;
        width: 800px;
        height: 650px;
        margin: 0 auto;
        background: #050505;
        border-radius: 50% 50% 0 0;
        overflow: hidden;
        padding-top: 50px;
    }

    .podium-box {
        width: 200px;
        background: white;
        color: black;
        font-weight: bold;
        text-align: center;
        padding: 10px;
        margin: 0 auto 40px;
        letter-spacing: 5px;
        z-index: 10;
        position: relative;
    }

    /* Stoel styling */
    .seat {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .seat:hover {
        transform: scale(1.5) !important;
        box-shadow: 0 0 8px white;
        z-index: 100;
    }

    .seat.selected {
        border: 2px solid white;
        box-shadow: 0 0 10px var(--emerald);
    }

    .seat.taken {
        background: #333 !important;
        cursor: not-allowed;
    }

    /* Kleuren uit je afbeelding */
    .s1 { background: #ffd700; } /* Geel */
    .s2 { background: #007bff; } /* Blauw */
    .s3 { background: #dc3545; } /* Rood */

    .booking-panel {
        text-align: center;
        margin-top: 20px;
        border-top: 1px solid #333;
        padding-top: 20px;
    }
</style>

<div class="modal" id="book-modal">
    <div class="theater-container" id="theater-arena">
        <div class="podium-box">PODIUM</div>
        </div>
    
    <div class="booking-panel">
        <p id="selected-info">Geen stoel geselecteerd</p>
        <button class="btn" id="confirm-btn" disabled onclick="processBooking()">RESERVEER NU</button>
        <button class="btn" style="background:#222; color:white;" onclick="closeAll()">ANNULEREN</button>
    </div>
</div>

<script>
    let selectedSeatId = null;

    function buildSeating() {
        const arena = document.getElementById('theater-arena');
        // Verwijder oude stoelen behalve het podium
        const seats = arena.querySelectorAll('.seat');
        seats.forEach(s => s.remove());

        const centerX = 400; // Midden van de container
        const centerY = 50;  // Startpunt boog (bij het podium)

        // we bouwen 25 rijen in een boogvorm
        for (let row = 1; row <= 25; row++) {
            const radius = 100 + (row * 18); // Elke rij staat verder weg
            const seatCount = 15 + (row * 1.5); // Meer stoelen in de achterste rijen
            const angleStep = (Math.PI * 0.8) / seatCount; // Hoe breed de boog is
            const startAngle = Math.PI * 1.1; 

            for (let i = 0; i < seatCount; i++) {
                const angle = startAngle + (i * angleStep);
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);

                const seat = document.createElement('div');
                const seatId = `R${row}S${i}`;
                
                // Bepaal kleur op basis van rij (zoals op de plattegrond)
                let type = 's1';
                if (row > 22) type = 's3'; // Achterste rijen rood
                else if (i < 3 || i > seatCount - 4) type = 's2'; // Zijkanten blauw
                
                seat.className = `seat ${type}`;
                seat.style.left = `${x}px`;
                seat.style.top = `${y}px`;
                seat.style.transform = `rotate(${angle + Math.PI/2}rad)`;
                
                seat.onclick = () => selectSeat(seat, seatId);
                arena.appendChild(seat);
            }
        }
    }

    function selectSeat(element, id) {
        if (element.classList.contains('taken')) return;

        // Reset vorige selectie
        const prev = document.querySelector('.seat.selected');
        if (prev) prev.classList.remove('selected');

        element.classList.add('selected');
        selectedSeatId = id;
        document.getElementById('selected-info').innerText = `Geselecteerde stoel: ${id}`;
        document.getElementById('confirm-btn').disabled = false;
    }

    async function processBooking() {
        if (!auth.currentUser) return alert("Je moet ingelogd zijn om te reserveren.");
        
        try {
            // Update Firestore
            await db.collection('shows').doc(activeShowId).update({
                takenSeats: firebase.firestore.FieldValue.arrayUnion(selectedSeatId)
            });
            
            alert("Magisch! Je stoel is gereserveerd.");
            closeAll();
            renderCalendar();
        } catch (error) {
            console.error("Booking error:", error);
            alert("Er ging iets mis met de spreuk. Probeer het opnieuw.");
        }
    }

    // Zorg dat de shows zichtbaar blijven voor iedereen
    async function renderCalendar() {
        const cal = document.getElementById('calendar');
        cal.innerHTML = 'Magie wordt geladen...';
        
        try {
            const snap = await db.collection('shows').orderBy('day').get();
            cal.innerHTML = '';
            
            // Bouw de kalenderdagen 1 t/m 31
            for (let i = 1; i <= 31; i++) {
                const show = snap.docs.find(d => d.data().day == i);
                const dayEl = document.createElement('div');
                dayEl.className = `day ${show ? 'active' : ''}`;
                
                if (show) {
                    dayEl.innerHTML = `<span style="font-size:12px;">${i}</span><b style="color:var(--emerald); font-size:10px;">${show.data().time}</b>`;
                    dayEl.onclick = () => openBooking(show.id);
                } else {
                    dayEl.innerHTML = `<span style="font-size:12px; color:#444;">${i}</span>`;
                }
                cal.appendChild(dayEl);
            }
        } catch (e) {
            cal.innerHTML = "Fout bij laden schema.";
        }
    }
</script>
