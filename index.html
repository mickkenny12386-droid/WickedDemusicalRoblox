<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked | Emerald City Booking</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --emerald: #97d72e; --witch-black: #0a0a0a; --magic-glow: 0 0 15px rgba(151, 215, 46, 0.6); }
        body { margin: 0; background: var(--witch-black); color: white; font-family: 'Montserrat', sans-serif; }

        /* Bezem Animatie */
        .broom { position: fixed; top: 20%; left: -100px; font-size: 40px; animation: fly 8s linear infinite; z-index: 10; pointer-events: none; opacity: 0.6; }
        @keyframes fly { 
            0% { left: -100px; transform: rotate(10deg); }
            50% { transform: translateY(-30px) rotate(-10deg); }
            100% { left: 110%; transform: rotate(10deg); } 
        }

        /* Navigatie */
        nav { background: rgba(0,0,0,0.95); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emerald); box-shadow: var(--magic-glow); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Cinzel', serif; font-size: 28px; letter-spacing: 3px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 25px; font-family: 'Cinzel', serif; transition: 0.3s; cursor: pointer; font-size: 14px; }
        .nav-links a:hover { color: var(--emerald); text-shadow: var(--magic-glow); }

        /* Hero */
        .hero { height: 400px; background: linear-gradient(to bottom, rgba(0,0,0,0.2), var(--witch-black)), url('https://www.wickedthemusical.co.uk/wp-content/uploads/2023/10/Wicked_Header_Green_Texture.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; text-shadow: 0 0 20px black; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: 5rem; margin: 0; letter-spacing: 10px; color: white; }

        /* Grid */
        .main-grid { max-width: 1200px; margin: -60px auto 50px; display: grid; grid-template-columns: 320px 1fr; gap: 25px; padding: 0 20px; }
        .glass-card { background: rgba(15, 15, 15, 0.95); border: 1px solid var(--emerald); border-radius: 15px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }

        /* Kalender */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .day { aspect-ratio: 1/1; border: 1px solid #222; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; border-radius: 5px; }
        .day.active { cursor: pointer; border-color: var(--emerald); background: rgba(151, 215, 46, 0.05); }
        .day.active:hover { background: rgba(151, 215, 46, 0.15); box-shadow: inset 0 0 10px var(--emerald); }
        .day-num { font-size: 12px; color: #555; margin-bottom: 5px; }
        .show-tag { font-size: 10px; font-weight: bold; color: var(--emerald); }

        /* Seating */
        .seating-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; margin-top: 20px; padding: 20px; background: #000; border-radius: 10px; }
        .seat { aspect-ratio: 1; background: #222; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .seat.free { background: var(--emerald); color: black; font-weight: bold; }
        .seat.vip { background: gold; box-shadow: 0 0 10px gold; color: black; }
        .seat.taken { background: #444; color: #888; cursor: not-allowed; border: none; }

        /* Modals */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f0f0f; padding: 40px; border: 2px solid var(--emerald); z-index: 1000; width: 500px; border-radius: 15px; box-shadow: 0 0 50px black; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 900; backdrop-filter: blur(5px); }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid var(--emerald); color: white; border-radius: 5px; box-sizing: border-box; }
        .btn { background: var(--emerald); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { box-shadow: var(--magic-glow); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="broom">🧹</div>
    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <nav>
        <div class="logo">WICKED <span style="color: var(--emerald);">ROBLOX</span></div>
        <div class="nav-links">
            <a onclick="location.reload()">HOME</a>
            <a id="admin-btn" style="display:none; color: gold; border: 1px solid gold; padding: 5px 10px; border-radius: 5px;" onclick="openModal('admin-modal')">WITCH MASTER (ADMIN)</a>
            <a id="login-nav" onclick="openModal('auth-modal')">LOG IN</a>
        </div>
    </nav>

    <div class="hero">
        <h1>MARCH 2026</h1>
        <p style="letter-spacing: 8px; color: var(--emerald);">BEWITCHING PERFORMANCES DAILY</p>
    </div>

    <div class="main-grid">
        <aside>
            <div class="glass-card">
                <h3 id="user-title">Welkom</h3>
                <div id="user-tickets" style="font-size: 13px; color: #aaa;">Log in voor tickets.</div>
            </div>
            <br>
            <div class="glass-card">
                <h3 style="color: var(--emerald); font-family: 'Cinzel';">CAST INFO</h3>
                <div id="cast-display" style="font-size: 14px; line-height: 1.6;">Laden...</div>
            </div>
        </aside>

        <main class="glass-card">
            <h2 style="font-family: 'Cinzel'; border-bottom: 1px solid #333; padding-bottom: 10px;">SPEELSCHEMA</h2>
            <div class="calendar" id="calendar"></div>
        </main>
    </div>

    <div class="modal" id="auth-modal">
        <h2 style="font-family: 'Cinzel'; color: var(--emerald);">Poort naar Emerald City</h2>
        <input type="email" id="auth-email" placeholder="E-mail">
        <input type="password" id="auth-pass" placeholder="Wachtwoord">
        <button class="btn" onclick="handleAuth()">BEVESTIGEN</button>
    </div>

    <div class="modal" id="book-modal" style="width: 650px;">
        <h2 id="book-date" style="font-family: 'Cinzel';">Reserveer Plaatsen</h2>
        <p id="book-cast" style="font-size: 12px; color: var(--emerald);"></p>
        <div class="seating-grid" id="seating-grid"></div>
        <br>
        <button class="btn" style="background: #333; color: white;" onclick="closeAll()">SLUITEN</button>
    </div>

    <div class="modal" id="admin-modal">
        <h2 style="font-family: 'Cinzel'; color: gold;">Admin Dashboard</h2>
        <label>Cast Info:</label>
        <textarea id="adm-cast-global" rows="3"></textarea>
        <button class="btn" onclick="updateGlobal()">UPDATE CAST</button>
        <hr style="border-top: 1px solid #333; margin: 15px 0;">
        <input type="number" id="adm-day" placeholder="Dag (1-31)">
        <input type="text" id="adm-time" placeholder="Tijd (bijv. 19:30)">
        <button class="btn" style="background: white;" onclick="addShow()">VOEG SHOW TOE</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC6NE5hOdVdRc1JJuxe5jbyT7LLaXJi84o",
            authDomain: "wickeddemusical.firebaseapp.com",
            projectId: "wickeddemusical",
            storageBucket: "wickeddemusical.firebasestorage.app",
            messagingSenderId: "81908034436",
            appId: "1:81908034436:web:1d56709ad83e7492e4cbd1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const ADMIN_EMAIL = "Virtual@gmail.com";

        async function handleAuth() {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try {
                await auth.signInWithEmailAndPassword(e, p);
                location.reload();
            } catch(err) {
                try {
                    await auth.createUserWithEmailAndPassword(e, p);
                    location.reload();
                } catch(e2) { alert(e2.message); }
            }
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                document.getElementById('login-nav').innerText = "UITLOGGEN";
                document.getElementById('login-nav').onclick = () => auth.signOut().then(()=>location.reload());
                document.getElementById('user-title').innerText = "Hallo, " + user.email.split('@')[0];
                
                // EXTRA CHECK VOOR ADMIN
                if(user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                    console.log("Admin ingelogd!");
                    document.getElementById('admin-btn').style.display = 'inline-block';
                }
                loadUserTickets(user.uid);
            }
            renderCalendar();
            loadGlobal();
        });

        async function loadGlobal() {
            const doc = await db.collection('settings').doc('global').get();
            if(doc.exists) document.getElementById('cast-display').innerText = doc.data().cast;
        }

        async function renderCalendar() {
            const snap = await db.collection('shows').get();
            const shows = {};
            snap.forEach(doc => shows[doc.data().day] = {id: doc.id, ...doc.data()});
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            for(let i=1; i<=31; i++) {
                const s = shows[i];
                cal.innerHTML += `<div class="day ${s ? 'active' : ''}" onclick="${s ? `openBooking('${s.id}', ${i})` : ''}">
                    <span class="day-num">${i}</span>
                    ${s ? `<span class="show-tag">${s.time}</span>` : ''}
                </div>`;
            }
        }

        let activeShow = null;
        async function openBooking(id, day) {
            activeShow = id;
            const doc = await db.collection('shows').doc(id).get();
            const data = doc.data();
            document.getElementById('book-date').innerText = day + " MAART";
            document.getElementById('book-cast').innerText = "Cast: " + (data.cast || "Standaard");
            const grid = document.getElementById('seating-grid');
            grid.innerHTML = '';
            const taken = data.takenSeats || [];
            for(let i=1; i<=48; i++) {
                let status = taken.includes(i) ? 'taken' : (i <= 12 ? 'vip' : 'free');
                grid.innerHTML += `<div class="seat ${status}" onclick="bookSeat(${i}, '${status}')">${i}</div>`;
            }
            openModal('book-modal');
        }

        async function bookSeat(num, status) {
            if(status === 'taken') return;
            if(!auth.currentUser) return openModal('auth-modal');
            await db.collection('shows').doc(activeShow).update({ takenSeats: firebase.firestore.FieldValue.arrayUnion(num) });
            await db.collection('users').doc(auth.currentUser.uid).collection('tickets').add({ seat: num, date: document.getElementById('book-date').innerText });
            alert("Gereserveerd!"); location.reload();
        }

        async function updateGlobal() {
            await db.collection('settings').doc('global').set({ cast: document.getElementById('adm-cast-global').value });
            alert("Bijgewerkt!"); location.reload();
        }

        async function addShow() {
            await db.collection('shows').add({ day: parseInt(document.getElementById('adm-day').value), time: document.getElementById('adm-time').value, takenSeats: [] });
            alert("Show toegevoegd!"); location.reload();
        }

        function openModal(id) {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById(id).style.display = 'block';
        }
        function closeAll() { document.querySelectorAll('.modal, .overlay').forEach(el => el.style.display = 'none'); }
        async function loadUserTickets(uid) {
            const snap = await db.collection('users').doc(uid).collection('tickets').get();
            const div = document.getElementById('user-tickets');
            if(!snap.empty) {
                div.innerHTML = '<b>Tickets:</b>';
                snap.forEach(doc => div.innerHTML += `<div style="color:var(--emerald); margin-top:3px;">• Stoel ${doc.data().seat}</div>`);
            }
        }
    </script>
</body>
</html>
