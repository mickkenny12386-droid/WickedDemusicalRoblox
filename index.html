<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked | Roblox Musical System</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --wicked-green: #97d72e; --dark: #0a0a0a; --gray: #333; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        
        /* Layout */
        nav { padding: 20px; background: #000; display: flex; justify-content: space-between; border-bottom: 1px solid var(--gray); }
        .container { max-width: 1200px; margin: 20px auto; display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 8px; border: 1px solid var(--gray); }
        
        /* Kalender */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid var(--gray); }
        .day { min-height: 80px; border: 1px solid var(--gray); padding: 5px; position: relative; }
        .show-btn { background: var(--wicked-green); color: #000; border: none; font-size: 10px; width: 100%; cursor: pointer; margin-top: 5px; font-weight: bold; }
        
        /* Seating Chart */
        .seating-chart { display: grid; grid-template-columns: repeat(10, 30px); gap: 5px; justify-content: center; margin-top: 20px; }
        .seat { width: 30px; height: 30px; background: var(--wicked-green); border-radius: 4px; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; color: #000; }
        .seat.taken { background: #444; cursor: not-allowed; color: #888; }
        .seat.blocked { background: #ff4444; cursor: not-allowed; }
        .screen { width: 200px; height: 10px; background: #fff; margin: 10px auto; text-align: center; color: #000; font-size: 8px; }

        /* Admin & Auth */
        #admin-panel, #auth-box, #booking-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border: 2px solid var(--wicked-green); display: none; z-index: 100; width: 400px; max-height: 80vh; overflow-y: auto; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid var(--gray); color: #fff; }
        .admin-btn { color: gold; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold;">WICKED <span style="color: var(--wicked-green);">ROBLOX</span></div>
    <div>
        <span id="admin-link" class="admin-btn" style="display:none; margin-right: 20px;" onclick="showAdmin()">ADMIN PANEEL</span>
        <span id="auth-btn" style="cursor:pointer;" onclick="showAuth()">INLOGGEN</span>
    </div>
</nav>

<div class="container">
    <aside>
        <div class="card">
            <h3 id="user-name">Welkom</h3>
            <div id="user-tickets">Log in om je tickets te zien.</div>
        </div>
    </aside>
    <main class="card">
        <h2>Speelschema Maart 2026</h2>
        <div class="calendar" id="calendar"></div>
    </main>
</div>

<div id="auth-box">
    <h3>Inloggen / Registreren</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Wachtwoord">
    <button class="show-btn" onclick="handleAuth()">BEVESTIG</button>
</div>

<div id="booking-box">
    <h3>Kies je stoel</h3>
    <div class="screen">PODIUM</div>
    <div class="seating-chart" id="seating-chart"></div>
    <button class="show-btn" style="margin-top:20px; background:#444; color:#fff;" onclick="this.parentElement.style.display='none'">SLUITEN</button>
</div>

<div id="admin-panel">
    <h3>Admin Beheer</h3>
    <p><b>Show Toevoegen:</b></p>
    <input type="number" id="new-day" placeholder="Dag van de maand (1-31)">
    <input type="text" id="new-time" placeholder="Tijd (bijv. 19:30)">
    <button class="show-btn" onclick="addShow()">VOEG SHOW TOE</button>
    <hr>
    <p><b>Geblokkeerde Stoelen:</b> (Nummers bijv: 1,2,5)</p>
    <input type="text" id="blocked-seats" placeholder="Stoelnummers">
    <button class="show-btn" onclick="saveSettings()">INSTELLINGEN OPSLAAN</button>
</div>

<script>
    // JOUW FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyC6NE5hOdVdRc1JJuxe5jbyT7LLaXJi84o",
        authDomain: "wickeddemusical.firebaseapp.com",
        projectId: "wickeddemusical",
        storageBucket: "wickeddemusical.firebasestorage.app",
        messagingSenderId: "81908034436",
        appId: "1:81908034436:web:1d56709ad83e7492e4cbd1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ADMIN_EMAIL = "JOUW_EMAIL@GMAIL.COM"; // PAS DIT AAN NAAR JOUW EMAIL

    let selectedShow = null;

    // Auth
    function showAuth() { document.getElementById('auth-box').style.display = 'block'; }
    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch(e) {
            await auth.createUserWithEmailAndPassword(email, pass);
        }
        location.reload();
    }

    auth.onAuthStateChanged(async user => {
        if(user) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('auth-btn').innerText = "UITLOGGEN";
            document.getElementById('auth-btn').onclick = () => auth.signOut().then(() => location.reload());
            document.getElementById('user-name').innerText = user.email;
            if(user.email === ADMIN_EMAIL) document.getElementById('admin-link').style.display = 'inline';
            loadUserTickets(user.uid);
        }
        loadShows();
    });

    // Shows laden
    async function loadShows() {
        const snap = await db.collection('shows').get();
        const grid = document.getElementById('calendar');
        grid.innerHTML = '';
        const shows = {};
        snap.forEach(doc => { shows[doc.data().day] = {id: doc.id, ...doc.data()}; });

        for(let i=1; i<=31; i++) {
            let html = `<div class="day"><span>${i}</span>`;
            if(shows[i]) {
                html += `<button class="show-btn" onclick="openBooking('${shows[i].id}', ${i})">${shows[i].time}</button>`;
            }
            grid.innerHTML += html + `</div>`;
        }
    }

    // Booking & Stoelen
    async function openBooking(showId, day) {
        selectedShow = showId;
        document.getElementById('booking-box').style.display = 'block';
        const chart = document.getElementById('seating-chart');
        chart.innerHTML = '';
        
        const showDoc = await db.collection('shows').doc(showId).get();
        const takenSeats = showDoc.data().takenSeats || [];
        const settings = await db.collection('settings').doc('global').get();
        const blockedSeats = settings.data().blockedSeats || [];

        for(let i=1; i<=50; i++) {
            let status = '';
            if(takenSeats.includes(i)) status = 'taken';
            if(blockedSeats.includes(i)) status = 'blocked';
            
            chart.innerHTML += `<div class="seat ${status}" onclick="bookSeat(${i}, '${status}')">${i}</div>`;
        }
    }

    async function bookSeat(num, status) {
        if(status !== '') return alert("Deze stoel is niet beschikbaar.");
        const user = auth.currentUser;
        if(!user) return alert("Log eerst in!");

        await db.collection('shows').doc(selectedShow).update({
            takenSeats: firebase.firestore.FieldValue.arrayUnion(num)
        });
        
        await db.collection('users').doc(user.uid).collection('tickets').add({
            showId: selectedShow,
            seat: num,
            date: "Maart 2026"
        });

        alert("Stoel " + num + " gereserveerd!");
        location.reload();
    }

    // Admin functies
    function showAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
    async function addShow() {
        const day = parseInt(document.getElementById('new-day').value);
        const time = document.getElementById('new-time').value;
        await db.collection('shows').add({ day, time, takenSeats: [] });
        alert("Show toegevoegd!");
        location.reload();
    }

    async function saveSettings() {
        const blocked = document.getElementById('blocked-seats').value.split(',').map(Number);
        await db.collection('settings').doc('global').set({ blockedSeats: blocked });
        alert("Instellingen opgeslagen!");
        location.reload();
    }

    async function loadUserTickets(uid) {
        const snap = await db.collection('users').doc(uid).collection('tickets').get();
        const div = document.getElementById('user-tickets');
        if(snap.empty) div.innerText = "Geen tickets."; else div.innerHTML = '';
        snap.forEach(doc => {
            div.innerHTML += `<div style="font-size:12px; margin-bottom:5px; color:var(--wicked-green)">🎟️ Stoel ${doc.data().seat}</div>`;
        });
    }
</script>

</body>
</html>
