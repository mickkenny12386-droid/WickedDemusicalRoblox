<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicked Official | Emerald Management</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --emerald: #97d72e; --gold: #d4af37; --glass: rgba(0, 0, 0, 0.95); --border: rgba(151, 215, 46, 0.4); }
        body { margin: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; background-image: linear-gradient(180deg, #000 0%, #050505 70%, #1a3300 100%); background-attachment: fixed; }
        
        nav { background: rgba(0,0,0,0.98); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emerald); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Cinzel'; font-size: 22px; letter-spacing: 3px; }
        .nav-links a { color: var(--emerald); text-decoration: none; font-weight: 600; font-size: 11px; text-transform: uppercase; cursor: pointer; margin-left: 15px; transition: 0.3s; }
        .nav-links a:hover { color: white; text-shadow: 0 0 10px var(--emerald); }

        .container { max-width: 1100px; margin: 30px auto; padding: 20px; }
        .section-box { background: var(--glass); border: 1px solid var(--border); padding: 35px; border-radius: 12px; display: none; backdrop-filter: blur(10px); }
        .section-box.active { display: block; animation: fadeIn 0.3s ease; }

        /* Kalender */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 20px; }
        .day { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 10px; text-align: center; border-radius: 5px; font-size: 13px; }
        .day.has-show { border-color: var(--emerald); background: rgba(151, 215, 46, 0.15); cursor: pointer; font-weight: bold; }
        .day.has-show:hover { background: var(--emerald); color: black; }

        /* Nieuws & Cast */
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 8px; overflow: hidden; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-bottom: 2px solid var(--emerald); }
        .card-body { padding: 15px; }

        /* Admin */
        .admin-panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .admin-list-item { background: #111; padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-size: 12px; }
        
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn { background: var(--emerald); color: black; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; width: 100%; transition: 0.2s; }
        .btn:hover { background: white; transform: translateY(-2px); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">WICKED <span style="color: var(--emerald);">NL</span></div>
        <div class="nav-links">
            <a onclick="showSection('theshow')">Schedule</a>
            <a onclick="showSection('newsletter')">News</a>
            <a onclick="showSection('cast-page')">Cast</a>
            <a onclick="showSection('audities')">Auditions</a>
            <a id="admin-nav" style="display:none; color:gold;" onclick="showSection('admin-box')">Admin Panel</a>
            <a id="auth-nav" onclick="showSection('login-box')">Login</a>
        </div>
    </nav>

    <div class="container">
        
        <section id="theshow" class="section-box active">
            <h2>Performance Schedule</h2>
            <p>Selecteer een datum voor meer informatie over de show.</p>
            <div id="calendar" class="calendar-grid"></div>
        </section>

        <section id="newsletter" class="section-box">
            <h2>Emerald City News</h2>
            <div id="news-container" class="grid-3"></div>
        </section>

        <section id="cast-page" class="section-box">
            <h2>The Cast of Oz</h2>
            <div id="cast-container" class="grid-3"></div>
        </section>

        <section id="audities" class="section-box">
            <h2>Auditions</h2>
            <div id="aud-form">
                <input type="text" id="aud-discord" placeholder="Discord Username (Required)">
                <input type="text" id="aud-role" placeholder="Desired Role">
                <textarea id="aud-text" placeholder="Musical Experience..."></textarea>
                <button class="btn" onclick="submitAudition()">Send Application</button>
            </div>
        </section>

        <section id="admin-box" class="section-box" style="border: 2px solid gold;">
            <h2 style="color:gold;">Witch Master Control</h2>
            <div class="admin-panel-grid">
                <div>
                    <h3>Add Show</h3>
                    <input type="number" id="adm-day" placeholder="Day (March)">
                    <input type="text" id="adm-time" placeholder="Time (19:30)">
                    <button class="btn" onclick="addShow()">Save Show</button>
                    
                    <h3 style="margin-top:20px;">Post News</h3>
                    <input type="text" id="adm-news-title" placeholder="Title">
                    <input type="text" id="adm-news-img" placeholder="Image URL">
                    <textarea id="adm-news-text" placeholder="News content..."></textarea>
                    <button class="btn" onclick="addNews()">Publish News</button>
                </div>
                <div>
                    <h3>Update Cast</h3>
                    <input type="text" id="adm-cast-role" placeholder="Role">
                    <input type="text" id="adm-cast-name" placeholder="Name">
                    <button class="btn" onclick="addCast()">Add Member</button>

                    <h3 style="margin-top:20px;">Management List</h3>
                    <div id="admin-data-list" style="max-height: 200px; overflow-y: auto; background: #000; padding: 5px;"></div>
                </div>
            </div>
            <button class="btn" style="background:red; color:white; margin-top:20px;" onclick="adminLogout()">Exit Admin Mode</button>
        </section>

        <section id="login-box" class="section-box">
            <h2>Identity Check</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="authAction('login')">Login</button>
            <button class="btn" style="background:none; border:1px solid white; color:white;" onclick="authAction('signup')">Create Account</button>
            <p onclick="adminGate()" style="text-align:center; color:gold; cursor:pointer; margin-top:20px; font-size:12px;">Admin Login</p>
        </section>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCm6vZCE1KH1SnclU7NHF2BmeOUW_suio",
            authDomain: "wickedrobloxofficial.firebaseapp.com",
            projectId: "wickedrobloxofficial",
            storageBucket: "wickedrobloxofficial.firebasestorage.app",
            messagingSenderId: "107452125942",
            appId: "1:107452125942:web:ca9c1222469fa41b1992d7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function showSection(id) {
            document.querySelectorAll('.section-box').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- DATA LADEN ---
        function loadAll() {
            // Kalender
            db.collection('shows').onSnapshot(snap => {
                const cal = document.getElementById('calendar');
                const shows = {};
                snap.forEach(doc => shows[doc.data().day] = doc.data().time);
                cal.innerHTML = '';
                for(let i=1; i<=31; i++) {
                    cal.innerHTML += `<div class="day ${shows[i] ? 'has-show' : ''}">${i}<br><small>${shows[i] || ''}</small></div>`;
                }
            });

            // Nieuws
            db.collection('newsletter').onSnapshot(snap => {
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    container.innerHTML += `
                        <div class="card">
                            <img src="${d.img || 'https://via.placeholder.com/400x200'}">
                            <div class="card-body"><h3>${d.title}</h3><p>${d.text}</p></div>
                        </div>`;
                });
            });

            // Cast
            db.collection('cast').onSnapshot(snap => {
                const container = document.getElementById('cast-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    container.innerHTML += `<div class="card" style="padding:20px; text-align:center;"><h3 style="color:gold">${doc.data().role}</h3><p>${doc.data().name}</p></div>`;
                });
            });
        }

        // --- ADMIN ACTIES ---
        async function addShow() {
            await db.collection('shows').add({
                day: document.getElementById('adm-day').value,
                time: document.getElementById('adm-time').value
            });
            alert("Show added!");
            loadAdminList();
        }

        async function addNews() {
            await db.collection('newsletter').add({
                title: document.getElementById('adm-news-title').value,
                img: document.getElementById('adm-news-img').value,
                text: document.getElementById('adm-news-text').value
            });
            alert("News posted!");
        }

        async function addCast() {
            await db.collection('cast').add({
                role: document.getElementById('adm-cast-role').value,
                name: document.getElementById('adm-cast-name').value
            });
            alert("Cast updated!");
        }

        async function loadAdminList() {
            const list = document.getElementById('admin-data-list');
            list.innerHTML = '<b>Shows:</b>';
            const shows = await db.collection('shows').get();
            shows.forEach(doc => {
                list.innerHTML += `<div class="admin-list-item">${doc.data().day} March <button onclick="deleteDoc('shows','${doc.id}')">Del</button></div>`;
            });
        }

        async function deleteDoc(col, id) {
            await db.collection(col).doc(id).delete();
            loadAdminList();
        }

        // --- AUDITIES ---
        async function submitAudition() {
            const discord = document.getElementById('aud-discord').value;
            if(!discord) return alert("Discord username is verplicht!");
            await db.collection('auditions').add({
                discord: discord,
                role: document.getElementById('aud-role').value,
                text: document.getElementById('aud-text').value,
                timestamp: Date.now()
            });
            alert("Submitted!");
            showSection('theshow');
        }

        // --- AUTH & ADMIN GATE ---
        function adminGate() {
            if(prompt("Staff Password:") === "Virtualentertainment2025!") {
                localStorage.setItem('wicked_admin', 'true');
                location.reload();
            }
        }

        function adminLogout() {
            localStorage.removeItem('wicked_admin');
            location.reload();
        }

        auth.onAuthStateChanged(user => {
            if(user) document.getElementById('auth-nav').innerText = user.email.split('@')[0];
            if(localStorage.getItem('wicked_admin') === 'true') {
                document.getElementById('admin-nav').style.display = 'block';
                loadAdminList();
            }
        });

        async function authAction(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                if(type === 'login') await auth.signInWithEmailAndPassword(e, p);
                else await auth.createUserWithEmailAndPassword(e, p);
                location.reload();
            } catch(err) { alert(err.message); }
        }

        loadAll();
    </script>
</body>
</html>
