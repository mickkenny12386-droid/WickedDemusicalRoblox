<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moulin Rouge! | The Spectacular Musical</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --rouge: #e60000; --gold: #d4af37; --bg: #0a0a0a; --card: #151515; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; margin: 0; }
        
        /* Navigatie */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 40px; background: #000; border-bottom: 2px solid var(--gold);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-right a, .lang-btn { color: white; text-decoration: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; }
        .nav-right a:hover { color: var(--gold); }

        /* Secties */
        section { padding: 60px 10%; display: none; }
        .active { display: block; }
        
        .glow-title { font-family: 'Cinzel Decorative'; color: #ffcc33; text-shadow: 0 0 15px var(--rouge); text-align: center; font-size: 3rem; }

        /* Info Kaarten */
        #info-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .info-card { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 8px; }
        .info-card img { width: 100%; border-radius: 4px; margin-bottom: 10px; }

        /* Tickets & Agenda */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: #222; padding: 5px; }
        .day { background: var(--bg); min-height: 100px; padding: 5px; border: 1px solid #333; }
        .ticket-btn { background: var(--rouge); color: white; border: none; padding: 5px; cursor: pointer; font-size: 0.7rem; width: 100%; margin-top: 5px; }
        .ticket-btn:disabled { background: #444; cursor: not-allowed; }

        /* Dashboard & Forms */
        .admin-box { background: var(--card); padding: 30px; border: 1px solid var(--gold); margin-top: 20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
    </style>
</head>
<body>

<nav>
    <div style="font-family: 'Cinzel Decorative'; color: var(--gold); font-size: 1.2rem;">MOULIN ROUGE!</div>
    <div class="nav-right">
        <a onclick="showSection('home')">Home</a>
        <a onclick="showSection('casting')">Casting</a>
        <a onclick="showSection('tickets')">Tickets</a>
        <a onclick="checkLogin()">Club (Dashboard)</a>
        <div class="lang-btn" onclick="toggleLang()">🌐 <span id="lang-label">NL</span></div>
    </div>
</nav>

<section id="home" class="active">
    <h1 class="glow-title">WELCOME TO THE ROUGE</h1>
    <div id="info-container">
        </div>
</section>

<section id="casting">
    <h1 class="glow-title">AUDITIONS</h1>
    <div class="admin-box" style="max-width: 500px; margin: 0 auto;">
        <input type="text" id="cast-discord" placeholder="Discord Name">
        <input type="text" id="cast-roblox" placeholder="Roblox Name">
        <select id="cast-role-select">
            <option>Christian</option>
            <option>Satine</option>
            <option>Harold Zidler</option>
            <option>The Duke</option>
            <option>Ensemble</option>
        </select>
        <p>Present at rehearsals?</p>
        <select id="cast-present">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>
        <button class="btn-gold" onclick="submitAudition()">SUBMIT APPLICATION</button>
    </div>
</section>

<section id="tickets">
    <h1 class="glow-title">APRIL 2026</h1>
    <div class="calendar-grid" id="calendar-grid"></div>
</section>

<section id="dashboard">
    <h1 class="glow-title">ADMIN CLUB</h1>
    <div class="admin-box">
        <h3>Manage Content</h3>
        <input type="text" id="info-title" placeholder="Title">
        <input type="text" id="info-img" placeholder="Image URL (bijv. https://...)">
        <textarea id="info-text" placeholder="Description"></textarea>
        <button class="btn-gold" onclick="addInfoCard()">ADD TO HOME</button>
        
        <hr style="margin: 30px 0; border: 0.5px solid #444;">
        
        <h3>Manage Shows</h3>
        <input type="number" id="show-day" placeholder="Day in April">
        <button class="btn-gold" onclick="addShow()">CREATE SHOW</button>

        <hr style="margin: 30px 0; border: 0.5px solid #444;">

        <h3>Auditions Received</h3>
        <table>
            <thead><tr><th>Discord</th><th>Roblox</th><th>Role</th><th>Present</th></tr></thead>
            <tbody id="audition-list"></tbody>
        </table>
    </div>
</section>

<script>
    // Data Storage (Normaal gebruik je Firebase, dit is voor nu lokaal)
    let infoCards = [];
    let auditions = [];
    let shows = {}; 

    // Stoelen configuratie
    const CAPACITY = { cancan: 24, rang1: 76, diamond: 260, bohemian: 96 };

    function showSection(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function checkLogin() {
        let pass = prompt("Enter Club Password:");
        if (pass === "Virtual2025!") {
            showSection('dashboard');
        } else {
            alert("Wrong Password!");
        }
    }

    // HOME FUNCTIES
    function addInfoCard() {
        const card = {
            id: Date.now(),
            title: document.getElementById('info-title').value,
            img: document.getElementById('info-img').value,
            text: document.getElementById('info-text').value
        };
        infoCards.push(card);
        renderHome();
    }

    function renderHome() {
        const container = document.getElementById('info-container');
        container.innerHTML = infoCards.map(c => `
            <div class="info-card">
                <img src="${c.img || 'https://via.placeholder.com/300x150'}" alt="info">
                <h3>${c.title}</h3>
                <p>${c.text}</p>
                <button onclick="deleteInfo(${c.id})" style="background:none; color:red; border:none; cursor:pointer;">[Verwijderen]</button>
            </div>
        `).join('');
    }

    function deleteInfo(id) {
        infoCards = infoCards.filter(c => c.id !== id);
        renderHome();
    }

    // CASTING FUNCTIES
    function submitAudition() {
        const auditie = {
            discord: document.getElementById('cast-discord').value,
            roblox: document.getElementById('cast-roblox').value,
            role: document.getElementById('cast-role-select').value,
            present: document.getElementById('cast-present').value
        };
        auditions.push(auditie);
        alert("Audition sent!");
        renderAuditions();
    }

    function renderAuditions() {
        const list = document.getElementById('audition-list');
        list.innerHTML = auditions.map(a => `
            <tr><td>${a.discord}</td><td>${a.roblox}</td><td>${a.role}</td><td>${a.present}</td></tr>
        `).join('');
    }

    // TICKET FUNCTIES
    function initCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        for (let i = 1; i <= 30; i++) {
            grid.innerHTML += `<div class="day" id="day-${i}"><small>${i}</small><div id="shows-${i}"></div></div>`;
        }
    }

    function addShow() {
        const day = document.getElementById('show-day').value;
        if (!day || day < 1 || day > 30) return;
        
        if (!shows[day]) {
            shows[day] = { cancan: 0, rang1: 0, diamond: 0, bohemian: 0 };
        }
        renderTickets();
    }

    function buyTicket(day, type) {
        if (shows[day][type] < CAPACITY[type]) {
            shows[day][type]++;
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            alert(`Ticket bought for ${type}!`);
            renderTickets();
        }
    }

    function renderTickets() {
        for (let day in shows) {
            const container = document.getElementById(`shows-${day}`);
            const s = shows[day];
            container.innerHTML = `
                <button class="ticket-btn" onclick="buyTicket(${day}, 'cancan')" ${s.cancan >= CAPACITY.cancan ? 'disabled' : ''}>
                    Can-Can (${CAPACITY.cancan - s.cancan} left)
                </button>
                <button class="ticket-btn" onclick="buyTicket(${day}, 'rang1')" ${s.rang1 >= CAPACITY.rang1 ? 'disabled' : ''}>
                    Rang 1 (${CAPACITY.rang1 - s.rang1} left)
                </button>
            `;
            if (s.cancan >= CAPACITY.cancan && s.rang1 >= CAPACITY.rang1) {
                container.innerHTML += `<div style="color:red; font-size:0.6rem; font-weight:bold;">SOLD OUT</div>`;
            }
        }
    }

    function toggleLang() {
        const lbl = document.getElementById('lang-label');
        lbl.innerText = lbl.innerText === 'NL' ? 'EN' : 'NL';
        confetti({ particleCount: 50 });
        // Hier kun je tekstvertalingen toevoegen zoals in de vorige code
    }

    initCalendar();
</script>
</body>
</html>
